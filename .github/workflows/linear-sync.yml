# Closes the loop: when an agent PR merges, the Linear card moves to Done.
# This is the bureau's complete-card principle made structural — the Done
# transition fires from GitHub's merge event (ground truth), never from an
# agent's claim that it merged something.
#
# Reusable workflow: permissions live in the calling stub.
name: Linear Sync (reusable)

on:
  workflow_call:
    inputs:
      pipeline_ref:
        description: >-
          bureau-pipeline ref for the INTERNAL checkouts (scripts, briefs,
          standards). A stub pinned to this workflow @vN MUST pass the same
          vN here, or its scripts still float @main. Omitted = main (the
          rolling channel), byte-identical to the pre-DRE-2026 behavior.
        type: string
        required: false
        default: main
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      LINEAR_API_KEY:
        required: true
      BUREAU_APP_ID:
        required: false
      BUREAU_APP_PRIVATE_KEY:
        required: false
      BUREAU_QA_APP_ID:
        required: false
      BUREAU_QA_APP_PRIVATE_KEY:
        required: false

jobs:
  card-done:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: dreadnought-foundry/bureau-pipeline
          ref: ${{ inputs.pipeline_ref || 'main' }}
          path: .bureau-pipeline

      - name: Card → Done
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          CARD=$(printf '%s\n%s' "$HEAD_REF" "$PR_TITLE" | grep -oiE 'DRE-[0-9]+' | head -1 | tr '[:lower:]' '[:upper:]' || true)
          if [ -z "$CARD" ]; then
            echo "no card reference in branch/title — nothing to sync"
            exit 0
          fi
          python3 .bureau-pipeline/scripts/linear_ops.py state "$CARD" "Done"
          python3 .bureau-pipeline/scripts/linear_ops.py comment "$CARD" \
            "✅ Merged: $PR_URL"
          # Event-driven promotion: this Done may have just unblocked
          # dependent Backlog children — promote them NOW instead of making
          # them wait for the drifting cron sweep ("*/15" delivers 78-100 min
          # apart in practice). Promotion is pure Linear; the Backlog→Todo
          # transition rides the relay webhook for the actual agent dispatch.
          REPO="$GITHUB_REPOSITORY" \
            REPO_SLUG=$(basename "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]') \
            MAX_WIP=8 \
            python3 .bureau-pipeline/scripts/reconcile.py --promote-only
          # Event-driven epic close: this Done may have been an epic's LAST
          # child — close the parent NOW instead of letting it read "still
          # working" until the drifting cron's next full sweep (epic-close
          # runs only there otherwise). Pure Linear, like promotion above.
          # (Origin: DRE-1496 sat In Progress with 9/9 children Done; DRE-1552.)
          REPO="$GITHUB_REPOSITORY" \
            REPO_SLUG=$(basename "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]') \
            python3 .bureau-pipeline/scripts/reconcile.py --close-epics

  # Event-driven conflict sweep: a merge to the default branch is the exact
  # moment sibling PRs touching the same files go DIRTY — and DIRTY PRs emit
  # zero workflow events, so without this only the drifting cron notices.
  # (Origin: PR #1348 / DRE-1277 waited ~1h between sibling merges.)
  conflict-sweep:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Mint bot token
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BUREAU_APP_ID }}
          private-key: ${{ secrets.BUREAU_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          repository: dreadnought-foundry/bureau-pipeline
          ref: ${{ inputs.pipeline_ref || 'main' }}
          path: .bureau-pipeline

      - name: Dispatch fix agents for newly conflicted PRs
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          # The App token cannot dispatch workflows (HTTP 403 — same lesson
          # as reconcile.yml / DRE-1254): dispatches run under the stub's
          # github.token, which the stub grants actions:write.
          GH_DISPATCH_TOKEN: ${{ github.token }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          REPO: ${{ github.repository }}
        run: |
          # GitHub recomputes sibling mergeability lazily after a merge;
          # give it a beat, then sweep twice so a slow recompute still
          # lands inside this run rather than waiting for the cron.
          sleep 45
          python3 .bureau-pipeline/scripts/reconcile.py --conflicts-only
          sleep 60
          python3 .bureau-pipeline/scripts/reconcile.py --conflicts-only
