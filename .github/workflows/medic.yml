# Pipeline medic: when any pipeline workflow fails, retry transient
# infrastructure flakes once automatically (e.g. Docker Hub pull timeouts).
# If the retry fails too, summon a diagnosis agent that reads the logs and
# reports in plain English to Linear — to the card if one is involved,
# otherwise as a new Triage card. Machines watch; agents think.
#
# EXCEPTION (DRE-1921, the #1 quota-burn fix): a QA critic that crashed on
# INFRASTRUCTURE (a GitHub rate-limit, or an auth/startup death) is NOT a
# retryable failure. qa-review.yml posts a neutral "could not run (infra error)"
# comment and fails the job loudly "for medic visibility" — but re-running the
# critic against an exhausted rate-limit cannot succeed and only deepens the
# limit, and the diagnosis agent burns yet more GitHub quota. On 2026-06-28 six
# PRs looped on exactly this and burned the bot's GitHub quota twice. So before
# retrying or diagnosing, the medic classifies the failed run; on a critic
# infra-crash it BACKS OFF (no rerun, no diagnosis agent), posts a single
# plain-English "reviewer down (infra) — not a code rejection" note, and lets a
# later natural trigger (a new push, the rate-limit window resetting) re-review.
#
# Reusable workflow: the workflow_run trigger list (which workflows to watch)
# lives in the calling stub — it can include product-specific CI workflows.
name: Pipeline Medic (reusable)

on:
  workflow_call:
    inputs:
      pipeline_ref:
        description: >-
          bureau-pipeline ref for the INTERNAL checkouts (scripts, briefs,
          standards). A stub pinned to this workflow @vN MUST pass the same
          vN here, or its scripts still float @main. Omitted = main (the
          rolling channel), byte-identical to the pre-DRE-2026 behavior.
        type: string
        required: false
        default: main
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      LINEAR_API_KEY:
        required: true
      BUREAU_APP_ID:
        required: true
      BUREAU_APP_PRIVATE_KEY:
        required: true
      BUREAU_QA_APP_ID:
        required: false
      BUREAU_QA_APP_PRIVATE_KEY:
        required: false

jobs:
  # Classify the failed run BEFORE any retry/diagnose fires (DRE-1921). A QA
  # critic infra-crash (rate-limit / auth) must not be re-run — doing so deepens
  # the limit and loops, burning the bot's GitHub quota. This single job fetches
  # the failed run's logs once and exposes `infra_crash` to gate the jobs below.
  classify:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      infra_crash: ${{ steps.c.outputs.infra_crash }}
    steps:
      - uses: actions/checkout@v5
        with:
          repository: dreadnought-foundry/bureau-pipeline
          ref: ${{ inputs.pipeline_ref || 'main' }}
          path: .bureau-pipeline
      - name: Classify failed run
        id: c
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Pull the failed run's logs (best-effort — a fetch failure must not
          # crash the classifier; we default to "not a crash" = normal handling).
          gh run view ${{ github.event.workflow_run.id }} --log-failed \
            --repo ${{ github.repository }} > /tmp/medic-log.txt 2>/dev/null || : > /tmp/medic-log.txt
          OUT=$(python3 .bureau-pipeline/scripts/medic_classify.py \
            "${{ github.event.workflow_run.name }}" /tmp/medic-log.txt)
          echo "$OUT" >> "$GITHUB_OUTPUT"
          echo "$OUT"

  # Re-run transient flakes once — UNLESS the classifier flagged a critic
  # infra-crash (DRE-1921), in which case re-running cannot help and only
  # deepens the rate-limit. A real REQUEST_CHANGES verdict never reaches here:
  # the critic RAN, the qa-review job ended green, and the fix routes through
  # agent-fix.yml — not the medic.
  retry:
    needs: classify
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt == 1 &&
      needs.classify.outputs.infra_crash != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Rerun failed jobs once
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "retrying ${{ github.event.workflow_run.name }} run ${{ github.event.workflow_run.id }} (attempt 1 failed)"
          gh run rerun ${{ github.event.workflow_run.id }} --failed --repo ${{ github.repository }}

  # Critic infra-crash back-off (DRE-1921). No rerun, no diagnosis agent —
  # just one plain-English note so the stall is visible without burning quota.
  # The reviewer was DOWN (infra), this is NOT a code rejection; a later natural
  # trigger (a new push, or the rate-limit window resetting) re-reviews. Runs on
  # attempt 1 only so it posts the note ONCE per failed run, not on every rerun.
  backoff:
    needs: classify
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt == 1 &&
      needs.classify.outputs.infra_crash == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          repository: dreadnought-foundry/bureau-pipeline
          ref: ${{ inputs.pipeline_ref || 'main' }}
          path: .bureau-pipeline
      - name: Note reviewer-down (infra) on the card — no rerun
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          # DRE-1996: env, not inline ${{ }} — branch names are agent-chosen
          # and git refnames may contain $ and backticks (shell injection).
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          # The card (if any) is encoded in the head branch (agent/DRE-N).
          CARD=$(printf '%s' "$HEAD_BRANCH" | grep -oiE 'DRE-[0-9]+' | head -1 | tr '[:lower:]' '[:upper:]' || true)
          echo "critic infra-crash on ${{ github.event.workflow_run.html_url }} — backing off (no rerun, no diagnosis); card=${CARD:-none}"
          if [ -n "$CARD" ]; then
            python3 .bureau-pipeline/scripts/linear_ops.py comment "$CARD" \
              "🔌 The code reviewer was temporarily unavailable (an infrastructure rate-limit, not a problem with the work). The pipeline is deliberately NOT retrying right now — retrying would make the rate-limit worse. The review will run again on its own once the limit resets or the next change is pushed. No action needed from you; nothing was rejected." || true
          fi

  diagnose:
    needs: classify
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt >= 2 &&
      needs.classify.outputs.infra_crash != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Mint bot token
        id: app
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BUREAU_APP_ID }}
          private-key: ${{ secrets.BUREAU_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: dreadnought-foundry/bureau-pipeline
          ref: ${{ inputs.pipeline_ref || 'main' }}
          path: .bureau-pipeline

      # Assemble the medic's context = the engineering standard (to ground its
      # diagnosis) + the comms standard (its report is CEO-facing) (DRE-1646).
      # assemble_context.py reads the files from this checkout at run time, so a
      # `@main` standards edit reaches the medic on its next run, no workflow change.
      - name: Assemble medic context
        id: ctx
        run: |
          python3 .bureau-pipeline/scripts/assemble_context.py assemble medic \
            > .bureau-pipeline/agent-context.md
          echo "assembled $(wc -l < .bureau-pipeline/agent-context.md) lines of medic context"

      # DRE-1996: the head branch is agent-chosen (agent/* refs) — attacker-
      # influenceable text headed into the diagnosis prompt. Hand it to the
      # sanitizer via env (no shell expansion) to collapse any hostile shape
      # into one defanged line; the prompt interpolates only the sanitized
      # output. tests/test_untrusted_content_wiring.py pins this.
      - name: Sanitize agent-influenced prompt fields
        id: safe
        env:
          RAW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          python3 .bureau-pipeline/scripts/sanitize_untrusted.py \
            line RAW_HEAD_BRANCH head_branch

      - name: Diagnosis agent
        uses: anthropics/claude-code-action@v1
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        with:
          anthropic_api_key: ${{ vars.CLAUDE_AUTH_MODE != 'subscription' && secrets.ANTHROPIC_API_KEY || '' }}
          claude_code_oauth_token: ${{ vars.CLAUDE_AUTH_MODE == 'subscription' && secrets.CLAUDE_CODE_OAUTH_TOKEN || '' }}
          # github.token, NOT the App token: the App deliberately lacks
          # actions:read, so a diagnosis agent holding it cannot fetch the
          # failed run's logs — it was diagnosing blind (DRE-1346 Fix 3).
          # The calling stub grants this token actions access.
          github_token: ${{ github.token }}
          allowed_bots: "*"
          claude_args: |
            --max-turns 40
            --model claude-sonnet-4-6
            --allowedTools "Bash,Read,Glob,Grep,Write"
          prompt: |
            Read .bureau-pipeline/agent-context.md FIRST — the shared bureau
            engineering standard (to ground your diagnosis) and the comms
            standard (your report goes to the non-technical CEO).

            You are the pipeline medic for this repo. The workflow
            "${{ github.event.workflow_run.name }}" failed twice (original run
            + one automatic retry), so this is NOT a transient flake.

            Failed run: ${{ github.event.workflow_run.html_url }}
            Head branch: ${{ steps.safe.outputs.head_branch }}

            1. Read the failure logs:
               gh run view ${{ github.event.workflow_run.id }} --log-failed
               (GH_TOKEN is in your env.)
            2. Diagnose the root cause. Distinguish: (a) bad code on the
               branch, (b) broken workflow/config, (c) external service
               failure, (d) missing secret/permission.
            3. Report in PLAIN ENGLISH for a non-technical reader: what
               failed, why, and what kind of fix it needs (2-5 sentences).
               Include one line of precise technical detail at the end for
               whoever fixes it.
            4. Deliver the report:
               - If the head branch matches agent/DRE-N, comment on that card:
                 python3 .bureau-pipeline/scripts/linear_ops.py comment DRE-N "<report>"
               - Otherwise: FIRST check for an existing open card for this same
                 failure — search Linear (GraphQL via curl with LINEAR_API_KEY,
                 or linear_ops) for a Triage/Todo/In Progress issue titled
                 "Pipeline failure: ${{ github.event.workflow_run.name }}".
                 If one exists, ADD A COMMENT to it ("failed again at <run url>;
                 diagnosis unchanged/changed: ...") instead of creating a card.
                 Only if none exists: write the report to /tmp/diag.md, then:
                 python3 .bureau-pipeline/scripts/linear_ops.py create "Pipeline failure: ${{ github.event.workflow_run.name }}" /tmp/diag.md
            Do NOT attempt to fix anything — diagnose and report only.
