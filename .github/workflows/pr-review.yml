# Self-critic stub — run the adversarial QA critic on bureau-pipeline's OWN PRs.
#
# Every product repo runs the critic via a thin stub like this; until now the
# pipeline repo itself was the one exception — its workflows are all reusable
# (workflow_call) and never fire on its own PRs, so control-plane changes (the
# merge gate, the agents' prompts) shipped with NO adversarial review. This
# stub closes that: same reusable qa-review, same verdict contract, on every
# PR here. Since DRE-1929 (accepted adr-bureau-pipeline-self-host) the full
# stub set exists — self-merge-gate.yml DOES auto-merge on an authenticated
# APPROVE: main is the staging channel (the fleet consumes human-promoted
# tags), so the permanent human gate is release PROMOTION, not per-PR merges.
# This file stays the ONE qa-review stub; don't add a second caller.
#
# SECURITY — the `uses:` ref is the FULLY QUALIFIED @main form on purpose.
# A local `./.github/workflows/qa-review.yml` reference would resolve from the
# PR's merge ref, letting a PR that edits qa-review.yml choose the logic that
# reviews itself. @main pins the critic to the already-merged version.
name: QA Review

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true

concurrency:
  group: qa-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  # DRE-1927: the repair-PR review context fetches the ORIGINAL failing
  # run's logs with github.token (the qa-bot App deliberately lacks
  # actions:read). Read-only; absent it, the stage degrades to the
  # maximum-suspicion fallback rather than blocking review.
  actions: read

jobs:
  call:
    # DEPENDABOT (DRE-2047): a pull_request run triggered by dependabot[bot]
    # receives GitHub's separate Dependabot secrets store (empty for us) plus
    # a read-only token — `secrets: inherit` passes nothing and the reusable
    # dies at required-secret validation with ZERO steps (PRs #93–#96, run
    # 29168433294). Skip that doomed run here, at the only point early
    # enough; the reconcile sweep dispatches the REAL review for dependabot
    # PRs via workflow_dispatch below (full secrets, reviewing the PR ref —
    # never pull_request_target against untrusted code).
    if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
    uses: dreadnought-foundry/bureau-pipeline/.github/workflows/qa-review.yml@main
    secrets: inherit
