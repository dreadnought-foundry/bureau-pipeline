# Critic agent: adversarially reviews every agent PR and posts a verdict in
# plain English (the CEO judges outcomes, not diffs). The verdict is advisory
# input to merge-gate.yml — the merge itself happens only when CI is green
# AND the verdict is APPROVE.
#
# Reusable workflow: concurrency + permissions live in the calling stub.
name: QA Review (reusable)

on:
  workflow_call:
    inputs:
      pipeline_ref:
        description: >-
          bureau-pipeline ref for the INTERNAL checkouts (scripts, briefs,
          standards). A stub pinned to this workflow @vN MUST pass the same
          vN here, or its scripts still float @main. Omitted = main (the
          rolling channel), byte-identical to the pre-DRE-2026 behavior.
        type: string
        required: false
        default: main
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      LINEAR_API_KEY:
        required: true
      # The critic mints its GitHub token from the qa-bot App, NOT the dispatch
      # bot (DRE-1921). The relay's repository_dispatch and the critic's review
      # API calls used to share the SAME bureau-bot installation, so they drew
      # down one 5,000/hr quota bucket together and exhausted it in lockstep
      # (the 2026-06-28 rate-limit incident). The qa-bot App is a SEPARATE
      # installation with its own independent quota, so card dispatch and code
      # review no longer compete. (qa-bot is also a non-author of agent PRs, so
      # its formal APPROVE review in sync_review_state.py now succeeds instead
      # of being rejected as a self-approval.) These are required here now; the
      # dispatch-bot secrets are no longer used by this workflow.
      BUREAU_APP_ID:
        required: false
      BUREAU_APP_PRIVATE_KEY:
        required: false
      BUREAU_QA_APP_ID:
        required: true
      BUREAU_QA_APP_PRIVATE_KEY:
        required: true

jobs:
  review:
    # Review every CARD PR, not just agent-dispatched ones (DRE-1888).
    #   • agent/DRE-N-*               — normal pipeline work (unchanged)
    #   • fix/DRE-N-*, feat/DRE-N-*…  — operator-routed card PRs (the ones the
    #     pipeline's repo-scoped agent tokens can't author, so the operator
    #     opens them by hand); these used to SKIP the critic and merge with no
    #     adversarial verdict — now they pass the same gate.
    #   • repair/<failing-sha>        — red-main auto-repair PRs (DRE-1927):
    #     cardless agent fixes to a broken main; the critic gets a repair
    #     context block (original failing log + test-touch flag) below.
    #   • dependabot/**               — dependency PRs (DRE-2039): the merge
    #     gate auto-merges grouped minor/patch bumps ONLY on a SHA-bound
    #     APPROVE, so the critic must run here too.
    # A branch with a linked Linear card (DRE-<n>, the signal linear-sync uses
    # to close the loop) is real product work and gets reviewed; a truly
    # chrome-only branch (no linked card) is still skipped below by the
    # "Decide review" step, which is the authoritative gate (should_review_pr.py).
    # This broadened `if:` just lets the job START for the same set of branches;
    # the Python step is the single source of truth for the decision.
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.pull_request.head.ref, 'agent/') ||
      startsWith(github.event.pull_request.head.ref, 'repair/') ||
      startsWith(github.event.pull_request.head.ref, 'dependabot/') ||
      contains(github.event.pull_request.head.ref, 'DRE-')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      # Mint from the qa-bot App so the critic's GitHub calls draw from the
      # qa-bot installation's SEPARATE 5,000/hr quota — not the dispatch bot's
      # bucket the relay's repository_dispatch already consumes (DRE-1921).
      # Kept as id `app` so every `steps.app.outputs.token` reference below is
      # unchanged; only the App identity behind the token moved.
      - name: Mint qa-bot token (separate quota from relay dispatch)
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BUREAU_QA_APP_ID }}
          private-key: ${{ secrets.BUREAU_QA_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: dreadnought-foundry/bureau-pipeline
          ref: ${{ inputs.pipeline_ref || 'main' }}
          path: .bureau-pipeline

      # Authoritative review gate (DRE-1888). A workflow_dispatch always
      # reviews (operator asked for it explicitly). For a PR event, the critic
      # runs iff the branch is an agent branch OR carries a linked card; a
      # chrome-only PR with no linked card is skipped here — every later step
      # is guarded on steps.decide.outputs.review so the job ends green-skip
      # without burning critic inference.
      - name: Decide review
        id: decide
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "review=true" >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch — reviewing on request"
            exit 0
          fi
          if python3 .bureau-pipeline/scripts/should_review_pr.py "$HEAD_REF"; then
            echo "review=true" >> "$GITHUB_OUTPUT"
          else
            echo "review=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve PR
        if: steps.decide.outputs.review == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          PR=${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          echo "number=$PR" >> "$GITHUB_OUTPUT"
          BRANCH=$(gh pr view "$PR" --json headRefName --jq .headRefName)
          CARD=$(printf '%s' "$BRANCH" | grep -oiE 'DRE-[0-9]+' | head -1 | tr '[:lower:]' '[:upper:]' || true)
          echo "card=$CARD" >> "$GITHUB_OUTPUT"
          # DRE-1990: capture the head commit the critic is about to review.
          # The verdict comment embeds it (`VERDICT: <X> @<sha>`) so
          # merge-gate can refuse to apply the verdict to any LATER commit.
          # Captured BEFORE the review starts — fail-closed: if code lands
          # mid-review, the embedded SHA is already behind the new head and
          # the gate holds for a fresh review instead of merging code the
          # critic never saw.
          SHA=$(gh pr view "$PR" --json headRefOid --jq .headRefOid)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      # Assemble the critic's context = the standards it reviews AGAINST
      # (engineering + architecture) plus the comms standard for its verdict
      # voice (DRE-1646). The critic has no role brief — standards are its whole
      # knowledge channel. assemble_context.py reads the files from this checkout
      # at run time, so a `@main` standards edit reaches the critic on its next
      # run with no workflow change. Shared by both critic attempts below.
      - name: Assemble critic context
        id: ctx
        if: steps.decide.outputs.review == 'true'
        run: |
          python3 .bureau-pipeline/scripts/assemble_context.py assemble critic \
            > .bureau-pipeline/agent-context.md
          echo "assembled $(wc -l < .bureau-pipeline/agent-context.md) lines of critic context"

      # ── Visual-QA stage (DRE-1481, layer 3b of DRE-1477) ──────────────────
      # When the PR's card has a **Design:** ref AND the PR changed UI, render
      # the affected screen(s) with the console harness (DRE-1480) and hand the
      # critic both the design PNG and the fresh screenshot to compare. This
      # GATES merges, so every branch here is conservative:
      #   • no **Design:** ref / non-UI change  → SKIP (never block)
      #   • harness or render failure           → NON-FATAL note (never block)
      #   • when in doubt                        → SKIP
      # The whole stage is best-effort: its product is just a `context` string
      # injected into the critic prompt. It cannot fail the job (continue-on-
      # error + a guaranteed fallback context), so it can never wedge the gate.
      - name: Plan visual QA
        id: vqplan
        if: steps.decide.outputs.review == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          PR: ${{ steps.pr.outputs.number }}
          CARD: ${{ steps.pr.outputs.card }}
        run: |
          set +e
          mkdir -p /tmp/vqa
          # The card description is the AUTHORITATIVE **Design:** source. The PR
          # body is agent-authored and not guaranteed to quote the ref verbatim,
          # so we read the live card and also scan the PR body as a backstop.
          gh pr view "$PR" --json body --jq .body > /tmp/vqa/pr-body.txt 2>/dev/null || true
          : > /tmp/vqa/card.txt
          if [ -n "$CARD" ]; then
            python3 .bureau-pipeline/scripts/linear_ops.py description "$CARD" > /tmp/vqa/card.txt 2>/dev/null || : > /tmp/vqa/card.txt
          fi
          # Changed files vs the PR base, repo-root-relative.
          gh pr diff "$PR" --name-only > /tmp/vqa/changed.txt 2>/dev/null || : > /tmp/vqa/changed.txt
          # The screen map is the harness's own contract (single source of truth).
          MJS=console/web/scripts/visual-qa/screens.mjs
          python3 .bureau-pipeline/scripts/visual_qa_plan.py \
            --card-text-file /tmp/vqa/card.txt \
            --pr-body-file /tmp/vqa/pr-body.txt \
            --changed-file /tmp/vqa/changed.txt \
            --screens-mjs "$MJS" > /tmp/vqa/plan.json 2>/dev/null
          # Any failure above → emit a safe skip plan so the gate degrades, never blocks.
          if [ ! -s /tmp/vqa/plan.json ] || ! python3 -c "import json;json.load(open('/tmp/vqa/plan.json'))" 2>/dev/null; then
            echo '{"run": false, "reason": "visual-QA planner unavailable — stage skipped (degrade, no block)"}' > /tmp/vqa/plan.json
          fi
          RUN=$(python3 -c "import json;print(json.load(open('/tmp/vqa/plan.json')).get('run') is True)")
          echo "run=$RUN" >> "$GITHUB_OUTPUT"
          echo "plan: $(cat /tmp/vqa/plan.json)"

      - name: Render affected screens
        id: vqshots
        # Only when the planner said run; best-effort, never fails the job.
        if: steps.decide.outputs.review == 'true' && steps.vqplan.outputs.run == 'True'
        continue-on-error: true
        env:
          # Force the harness to dodge live network even if a screen route would.
          CI: "true"
        run: |
          set +e
          SCREENS=$(python3 -c "import json;print(','.join(json.load(open('/tmp/vqa/plan.json')).get('screens',[])))")
          echo "rendering screens: $SCREENS"
          STATUS=degraded
          NOTE="harness did not run"
          if [ -n "$SCREENS" ]; then
            ( cd console/web \
              && npm ci --no-audit --no-fund \
              && npx playwright install --with-deps chromium \
              && npm run shots -- "$SCREENS" ) > /tmp/vqa/shots.log 2>&1
            RC=$?
            if [ "$RC" -eq 0 ]; then
              # Confirm each expected render actually exists and is non-empty.
              MISSING=""
              for k in $(echo "$SCREENS" | tr ',' ' '); do
                f="console/design/images/_renders/$k.png"
                if [ ! -s "$f" ]; then MISSING="$MISSING $k"; fi
              done
              if [ -z "$MISSING" ]; then
                STATUS=ok; NOTE=""
              else
                STATUS=degraded; NOTE="no render produced for:$MISSING"
              fi
            else
              STATUS=degraded; NOTE="screenshot harness exited $RC (see logs)"
            fi
          fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "note=$NOTE" >> "$GITHUB_OUTPUT"
          echo "[vqshots] status=$STATUS note=$NOTE"
          tail -40 /tmp/vqa/shots.log 2>/dev/null || true

      - name: Build critic visual context
        id: visual
        if: always() && !cancelled() && steps.decide.outputs.review == 'true'
        continue-on-error: true
        run: |
          set +e
          [ -s /tmp/vqa/plan.json ] || echo '{"run": false, "reason": "no plan"}' > /tmp/vqa/plan.json
          STATUS="${{ steps.vqshots.outputs.status }}"
          [ -n "$STATUS" ] || STATUS=degraded
          NOTE="${{ steps.vqshots.outputs.note }}"
          # Map each screen key to its render path for the context block.
          RENDERED=$(python3 -c "import json;print(' '.join(f'{k}=console/design/images/_renders/{k}.png' for k in json.load(open('/tmp/vqa/plan.json')).get('screens',[])))")
          python3 .bureau-pipeline/scripts/visual_qa_context.py \
            --plan-file /tmp/vqa/plan.json \
            --render-status "$STATUS" \
            --render-note "$NOTE" \
            --rendered $RENDERED > /tmp/vqa/context.txt 2>/dev/null
          # Guaranteed fallback: if context generation failed, emit a no-block note.
          if [ ! -s /tmp/vqa/context.txt ]; then
            echo "VISUAL QA: not available for this PR. Do NOT raise any visual-comparison finding and do NOT block on it." > /tmp/vqa/context.txt
          fi
          # Expose as a multiline output for the prompt blocks below.
          {
            echo "context<<VQA_EOF"
            cat /tmp/vqa/context.txt
            echo "VQA_EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Repair-PR stage (DRE-1927, adr-red-main-auto-repair guardrail 1) ──
      # A repair/<failing-sha> PR is an agent's fix for a broken main — the
      # critic must judge it against the ORIGINAL failing log, with every
      # test-tree edit mechanically flagged as a mandatory finding
      # (test-gutting is the #1 danger the ADR names). repair_context.py is
      # inert for non-repair branches, degrades to a maximum-suspicion
      # instruction when the log can't be fetched, and writes its output
      # under a random heredoc delimiter (log text must never terminate the
      # output block). The log listing/read needs actions:read, which the
      # qa-bot App deliberately lacks — that ONE read uses the workflow's
      # own token, and a blip degrades toward suspicion, never past it.
      - name: Build repair-PR review context
        id: repair
        if: steps.decide.outputs.review == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          RUNS_TOKEN: ${{ github.token }}
          PR: ${{ steps.pr.outputs.number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set +e
          mkdir -p /tmp/repair
          BRANCH=$(gh pr view "$PR" --json headRefName --jq .headRefName)
          gh pr diff "$PR" --name-only > /tmp/repair/changed.txt 2>/dev/null || : > /tmp/repair/changed.txt
          : > /tmp/repair/original-failure.log
          NOTE=""
          # The failing head SHA is encoded in the branch name itself —
          # deterministic, no trust in the PR body.
          SHA=$(printf '%s' "$BRANCH" | grep -oE '^repair/[0-9a-f]{40}' | cut -d/ -f2 || true)
          if [ -n "$SHA" ]; then
            RUN_ID=$(GH_TOKEN="$RUNS_TOKEN" gh api \
              "repos/${{ github.repository }}/actions/runs?head_sha=$SHA&status=failure&per_page=20" \
              --jq "first(.workflow_runs[] | select(.head_branch == \"$DEFAULT_BRANCH\")) | .id" 2>/dev/null)
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              GH_TOKEN="$RUNS_TOKEN" gh run view "$RUN_ID" --log-failed \
                --repo ${{ github.repository }} > /tmp/repair/original-failure.log 2>/dev/null \
                || NOTE="log fetch failed for run $RUN_ID"
            else
              NOTE="no failed default-branch run found for $SHA"
            fi
          fi
          python3 .bureau-pipeline/scripts/repair_context.py \
            --branch "$BRANCH" \
            --changed-file /tmp/repair/changed.txt \
            --log-file /tmp/repair/original-failure.log \
            --log-note "$NOTE"

      - name: Critic review
        id: critic
        if: steps.decide.outputs.review == 'true'
        uses: anthropics/claude-code-action@v1
        # A crash here (is_error / no verdict) must NOT fail-close into a
        # false REQUEST_CHANGES — the gate below detects it and we retry.
        continue-on-error: true
        with:
          anthropic_api_key: ${{ vars.CLAUDE_AUTH_MODE != 'subscription' && secrets.ANTHROPIC_API_KEY || '' }}
          claude_code_oauth_token: ${{ vars.CLAUDE_AUTH_MODE == 'subscription' && secrets.CLAUDE_CODE_OAUTH_TOKEN || '' }}
          github_token: ${{ steps.app.outputs.token }}
          # qa-bot included for the DRE-1924 skew-guard: merge-gate's update-branch
          # push fires synchronize as agent-bureau-qa-bot (DRE-2037).
          allowed_bots: agent-bureau-bot,agent-bureau-bot-2,agent-bureau-bot-3,agent-bureau-bot-4,agent-bureau-qa-bot,dependabot
          claude_args: |
            --max-turns 40
            --model claude-sonnet-4-6
            --allowedTools "Bash,Read,Glob,Grep,Write"
          prompt: |
            Read .bureau-pipeline/agent-context.md FIRST — the bureau
            engineering and architecture standards you review AGAINST, plus the
            comms standard that governs the VOICE of the verdict you write for
            the CEO. Hold the diff to those standards.

            You are an adversarial code reviewer. Review PR #${{ steps.pr.outputs.number }}
            in this repo (use `gh pr view ${{ steps.pr.outputs.number }}` and
            `gh pr diff ${{ steps.pr.outputs.number }}`; GH_TOKEN is in your env).
            It implements Linear card ${{ steps.pr.outputs.card }}.

            Check, in order of severity:
            1. Does the diff actually satisfy the card's acceptance criteria
               (read the card description quoted in the PR body, and any
               **Spec:** directory it references)? If the card has a
               `**Design:**` ref, Read the referenced design image(s) and
               compare the diff against it — flag as findings any missing or
               incorrect components, wrong structure/layout, wrong copy, or
               obviously wrong layout intent. These design files are
               normal-sized exported screen PNGs (under
               console/design/images/screens/...), safe to Read directly. If
               the card has NO `**Design:**` ref, skip this comparison — its
               absence is NOT a finding.

               VISUAL-QA STAGE (read this and follow it exactly — it gates
               merges, so it is deliberately conservative):
               ${{ steps.visual.outputs.context }}

               REPAIR-PR STAGE (DRE-1927 — follow it exactly; it gates
               agent-authored fixes to a broken main). Fallback rule: if
               this PR's head branch starts with `repair/` and
               the block below is empty, treat ANY change under a test tree
               as a blocking finding — going green by silencing the failing
               signal is the failure mode this stage exists to catch:
               ${{ steps.repair.outputs.context }}
            2. Are the tests REAL — do they assert meaningful behavior, would
               they fail if the implementation were wrong? Vacuous or
               tautological tests are a blocking finding.
            3. Correctness bugs, security issues, data-loss risks.
            4. Scope creep — changes beyond the card.
            5. Convention violations (style, naming, structure vs neighbors).

            Default skeptical: your job is to find reasons NOT to merge. If
            you cannot find any, approve.

            EXHAUSTIVE SINGLE PASS + CONVERGENCE (mandatory): examine the
            ENTIRE diff and list every blocking finding in THIS verdict — do
            not ration findings across rounds. If earlier QA Critic verdicts
            exist on this PR, you are RE-reviewing: verify the prior findings
            are resolved, review what changed since, and raise a NEW finding
            only if (a) the latest changes introduced it, or (b) it is
            data-loss/security severity. A re-review that unveils yet another
            pre-existing nit you could have caught earlier is a review
            failure, not diligence. (Origin: PR #7 took 6 rounds.)

            Write your verdict to /tmp/qa-verdict.md in TWO clearly separated
            parts — a business summary the CEO reads, then the technical detail
            the fixing agent reads:

            - First line exactly: `VERDICT: APPROVE` or `VERDICT: REQUEST_CHANGES`
            - Then `## Summary` — for the CEO, who is NON-TECHNICAL and reads
              this to make a decision, not to debug. Use plain business
              language:
                (a) what this change does for the product / the user, in 1-2
                    sentences;
                (b) whether it delivers what the card asked for;
                (c) if you are blocking, WHY it matters — described as the
                    user's experience or the business risk, NOT the mechanism.
                    Good: "When someone taps between menu sections, the new
                    section's sub-items don't appear, so the app looks broken."
                    Bad: "useState captures `active` once at mount so the
                    NavGroup never re-opens on client-side navigation."
              BANNED in this section: code, variable/function names, file paths,
              line numbers, framework or library terms (useState, props, API,
              client-side, component, etc.), and the word "test". If a
              non-technical reader couldn't act on it, rewrite it.
            - If REQUEST_CHANGES: AFTER the summary, a `## For the fixing agent`
              section with ALL the precise technical findings (file:line, what's
              wrong, the fix, any test gaps). This is the ONLY place technical
              language belongs — be as code-level and exact as the fixer needs.

      # Crash detection (mirrors DRE-1346's agent-result gate). A real
      # verdict requires is_error != true AND a verdict file with a VERDICT:
      # line. is_error / no-verdict means the critic did NOT actually run —
      # we must retry, never post the crash as REQUEST_CHANGES.
      - name: Gate critic result (attempt 1)
        id: gate1
        if: always() && !cancelled() && steps.decide.outputs.review == 'true'
        continue-on-error: true
        run: |
          EXEC_FILE="${{ steps.critic.outputs.execution_file }}"
          [ -n "$EXEC_FILE" ] || EXEC_FILE=/home/runner/work/_temp/claude-execution-output.json
          if python3 .bureau-pipeline/scripts/check_critic_result.py "$EXEC_FILE" /tmp/qa-verdict.md; then
            echo "real=true" >> "$GITHUB_OUTPUT"
          else
            echo "real=false" >> "$GITHUB_OUTPUT"
            echo "critic attempt 1 did not produce a real verdict — will retry"
          fi

      # Retry once (medic.yml's one-retry pattern, but in-workflow so we
      # don't burn a whole failed run + rerun cycle on a transient critic
      # crash). Clear any stale verdict so the gate re-evaluates honestly.
      - name: Clear stale verdict before retry
        if: always() && !cancelled() && steps.decide.outputs.review == 'true' && steps.gate1.outputs.real != 'true'
        run: rm -f /tmp/qa-verdict.md

      # NOTE: the with block below is intentionally duplicated from the
      # attempt-1 "Critic review" step and MUST be kept in sync with it.
      # GitHub Actions does NOT support YAML anchors / merge keys, so this
      # cannot be DRY'd with `&anchor` / `<<: *anchor` — the runner would
      # fail to parse the file, breaking the critic in every consuming repo.
      - name: Critic review (retry)
        id: critic_retry
        if: always() && !cancelled() && steps.decide.outputs.review == 'true' && steps.gate1.outputs.real != 'true'
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          anthropic_api_key: ${{ vars.CLAUDE_AUTH_MODE != 'subscription' && secrets.ANTHROPIC_API_KEY || '' }}
          claude_code_oauth_token: ${{ vars.CLAUDE_AUTH_MODE == 'subscription' && secrets.CLAUDE_CODE_OAUTH_TOKEN || '' }}
          github_token: ${{ steps.app.outputs.token }}
          # qa-bot included for the DRE-1924 skew-guard: merge-gate's update-branch
          # push fires synchronize as agent-bureau-qa-bot (DRE-2037).
          allowed_bots: agent-bureau-bot,agent-bureau-bot-2,agent-bureau-bot-3,agent-bureau-bot-4,agent-bureau-qa-bot,dependabot
          claude_args: |
            --max-turns 40
            --model claude-sonnet-4-6
            --allowedTools "Bash,Read,Glob,Grep,Write"
          prompt: |
            Read .bureau-pipeline/agent-context.md FIRST — the bureau
            engineering and architecture standards you review AGAINST, plus the
            comms standard that governs the VOICE of the verdict you write for
            the CEO. Hold the diff to those standards.

            You are an adversarial code reviewer. Review PR #${{ steps.pr.outputs.number }}
            in this repo (use `gh pr view ${{ steps.pr.outputs.number }}` and
            `gh pr diff ${{ steps.pr.outputs.number }}`; GH_TOKEN is in your env).
            It implements Linear card ${{ steps.pr.outputs.card }}.

            Check, in order of severity:
            1. Does the diff actually satisfy the card's acceptance criteria
               (read the card description quoted in the PR body, and any
               **Spec:** directory it references)? If the card has a
               `**Design:**` ref, Read the referenced design image(s) and
               compare the diff against it — flag as findings any missing or
               incorrect components, wrong structure/layout, wrong copy, or
               obviously wrong layout intent. These design files are
               normal-sized exported screen PNGs (under
               console/design/images/screens/...), safe to Read directly. If
               the card has NO `**Design:**` ref, skip this comparison — its
               absence is NOT a finding.

               VISUAL-QA STAGE (read this and follow it exactly — it gates
               merges, so it is deliberately conservative):
               ${{ steps.visual.outputs.context }}

               REPAIR-PR STAGE (DRE-1927 — follow it exactly; it gates
               agent-authored fixes to a broken main). Fallback rule: if
               this PR's head branch starts with `repair/` and
               the block below is empty, treat ANY change under a test tree
               as a blocking finding — going green by silencing the failing
               signal is the failure mode this stage exists to catch:
               ${{ steps.repair.outputs.context }}
            2. Are the tests REAL — do they assert meaningful behavior, would
               they fail if the implementation were wrong? Vacuous or
               tautological tests are a blocking finding.
            3. Correctness bugs, security issues, data-loss risks.
            4. Scope creep — changes beyond the card.
            5. Convention violations (style, naming, structure vs neighbors).

            Default skeptical: your job is to find reasons NOT to merge. If
            you cannot find any, approve.

            EXHAUSTIVE SINGLE PASS + CONVERGENCE (mandatory): examine the
            ENTIRE diff and list every blocking finding in THIS verdict — do
            not ration findings across rounds. If earlier QA Critic verdicts
            exist on this PR, you are RE-reviewing: verify the prior findings
            are resolved, review what changed since, and raise a NEW finding
            only if (a) the latest changes introduced it, or (b) it is
            data-loss/security severity. A re-review that unveils yet another
            pre-existing nit you could have caught earlier is a review
            failure, not diligence. (Origin: PR #7 took 6 rounds.)

            Write your verdict to /tmp/qa-verdict.md in TWO clearly separated
            parts — a business summary the CEO reads, then the technical detail
            the fixing agent reads:

            - First line exactly: `VERDICT: APPROVE` or `VERDICT: REQUEST_CHANGES`
            - Then `## Summary` — for the CEO, who is NON-TECHNICAL and reads
              this to make a decision, not to debug. Use plain business
              language:
                (a) what this change does for the product / the user, in 1-2
                    sentences;
                (b) whether it delivers what the card asked for;
                (c) if you are blocking, WHY it matters — described as the
                    user's experience or the business risk, NOT the mechanism.
                    Good: "When someone taps between menu sections, the new
                    section's sub-items don't appear, so the app looks broken."
                    Bad: "useState captures `active` once at mount so the
                    NavGroup never re-opens on client-side navigation."
              BANNED in this section: code, variable/function names, file paths,
              line numbers, framework or library terms (useState, props, API,
              client-side, component, etc.), and the word "test". If a
              non-technical reader couldn't act on it, rewrite it.
            - If REQUEST_CHANGES: AFTER the summary, a `## For the fixing agent`
              section with ALL the precise technical findings (file:line, what's
              wrong, the fix, any test gaps). This is the ONLY place technical
              language belongs — be as code-level and exact as the fixer needs.

      - name: Gate critic result (attempt 2)
        id: gate2
        if: always() && !cancelled() && steps.decide.outputs.review == 'true' && steps.gate1.outputs.real != 'true'
        continue-on-error: true
        run: |
          EXEC_FILE="${{ steps.critic_retry.outputs.execution_file }}"
          [ -n "$EXEC_FILE" ] || EXEC_FILE=/home/runner/work/_temp/claude-execution-output.json
          if python3 .bureau-pipeline/scripts/check_critic_result.py "$EXEC_FILE" /tmp/qa-verdict.md; then
            echo "real=true" >> "$GITHUB_OUTPUT"
          else
            echo "real=false" >> "$GITHUB_OUTPUT"
            echo "critic retry also did not produce a real verdict — neutral + fail"
          fi

      - name: Post verdict or neutral status
        id: post
        # not on cancellation: a superseded run must not post a fail-closed
        # verdict that masks the live run's real one. Skipped entirely when
        # the decide gate said this PR is chrome-only (no verdict to post).
        if: always() && !cancelled() && steps.decide.outputs.review == 'true'
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          PR: ${{ steps.pr.outputs.number }}
          CARD: ${{ steps.pr.outputs.card }}
          # DRE-1990: the commit this review actually looked at, captured at
          # review start by the Resolve PR step.
          REVIEWED_SHA: ${{ steps.pr.outputs.sha }}
          # A genuine review ran iff either gate saw a real verdict.
          REAL: ${{ (steps.gate1.outputs.real == 'true' || steps.gate2.outputs.real == 'true') && 'true' || 'false' }}
        run: |
          if [ "$REAL" = "true" ]; then
            # A real verdict (APPROVE or REQUEST_CHANGES with findings) from a
            # critic that actually ran — post it verbatim, BOUND to the commit
            # it reviewed (DRE-1990): the verdict line becomes
            # `VERDICT: <X> @<full-sha>` and merge-gate only honors it while
            # the PR head still IS that commit. Any push after an APPROVE
            # demotes it to no-verdict and the merge waits for a fresh review.
            # CUTOVER: verdicts posted before DRE-1990 carry no @sha and are
            # likewise treated as stale — an open PR with an old-format
            # APPROVE needs one re-review nudge (reconcile's In QA sweep now
            # re-triggers qa-review for verdicts not bound to the head).
            { echo "🔎 QA Critic — $(head -1 /tmp/qa-verdict.md) @${REVIEWED_SHA}"; echo; tail -n +2 /tmp/qa-verdict.md; } > /tmp/qa-comment.md
          else
            # The critic CRASHED on both attempts (is_error / no verdict). Do
            # NOT post REQUEST_CHANGES — that false reject churns good PRs into
            # the fix loop (#1441/#1442, DRE-1330/1332, 2026-06-13). Post a
            # NEUTRAL status: contains "QA Critic" (so merge-gate treats it as
            # the latest verdict and it supersedes any stale APPROVE) but NO
            # "VERDICT: APPROVE" line, so merge-gate holds rather than merges.
            # The job then fails loudly below → red + medic-visible.
            printf '%s\n\n%s\n' \
              "🔎 QA Critic could not run (infra error) — re-review needed, this is NOT a code rejection." \
              "The adversarial reviewer crashed twice (startup/auth failure, no inference). No findings were produced. Merge is held until a critic actually reviews this PR; this is not a request for changes." \
              > /tmp/qa-comment.md
          fi
          # The verdict comment is load-bearing (merge-gate reads it) —
          # retry through transient GitHub API blips rather than losing it.
          for i in 1 2 3 4; do
            gh pr comment "$PR" --body-file /tmp/qa-comment.md && break
            echo "comment attempt $i failed; retrying in $((i*10))s"; sleep $((i*10))
          done
          [ -n "$CARD" ] && python3 .bureau-pipeline/scripts/linear_ops.py comment "$CARD" "$(cat /tmp/qa-comment.md)" || true

          # DRE-1874: reconcile the FORMAL review state with the verdict. When
          # the critic earlier said REQUEST_CHANGES, claude-code-action submits
          # a formal "Changes requested" review (as this bot). On the APPROVE
          # flip, qa-review only posted a comment — the stale formal review kept
          # reviewDecision=CHANGES_REQUESTED and mergeStateStatus=BLOCKED, so
          # the merge-gate (and even --admin) couldn't merge until a human
          # dismissed it. On an APPROVE verdict, dismiss the stale
          # changes-requested review(s) AND submit a fresh APPROVE review so
          # GitHub's reviewDecision becomes APPROVED. Best-effort (the script
          # never fails the job) and idempotent.
          if [ "$REAL" = "true" ] && head -1 /tmp/qa-verdict.md | grep -q "VERDICT: APPROVE"; then
            python3 .bureau-pipeline/scripts/sync_review_state.py "${{ github.repository }}" "$PR" || true
          fi

      # Fail the job loudly AFTER the neutral comment is posted, so the
      # infra failure is visibly red and the medic picks it up. A genuine
      # review (real verdict) ends green regardless of APPROVE/REQUEST_CHANGES.
      - name: Fail if critic never really ran
        # Only when we actually tried to review — a chrome-only PR (decide
        # said skip) never runs the gates, so it must NOT fail here.
        if: always() && !cancelled() && steps.decide.outputs.review == 'true' && steps.gate1.outputs.real != 'true' && steps.gate2.outputs.real != 'true'
        run: |
          echo "::error::QA critic crashed on both attempts — no real verdict. Posted neutral status; failing job for medic visibility."
          exit 1
