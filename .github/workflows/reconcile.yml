# Reconcile sweep: every 15 minutes (cron lives in the calling stub), compare
# Linear card states against pipeline reality (runs, PRs, verdicts) and nudge
# whatever is stuck. The webhook path is primary; this sweep is the backstop
# that makes a missed webhook a 15-minute delay instead of a silent stall.
#
# Reusable workflow: permissions live in the calling stub (contents: read,
# actions: write). Job-level concurrency stays here.
name: Reconcile (reusable)

on:
  workflow_call:
    inputs:
      pipeline_ref:
        description: >-
          bureau-pipeline ref for the INTERNAL checkouts (scripts, briefs,
          standards). A stub pinned to this workflow @vN MUST pass the same
          vN here, or its scripts still float @main. Omitted = main (the
          rolling channel), byte-identical to the pre-DRE-2026 behavior.
        type: string
        required: false
        default: main
      max_wip:
        description: WIP cap for the dependency gate's auto-promotion
        type: string
        required: false
        default: "8"
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      LINEAR_API_KEY:
        required: true
      BUREAU_APP_ID:
        required: true
      BUREAU_APP_PRIVATE_KEY:
        required: true
      BUREAU_QA_APP_ID:
        required: false
      BUREAU_QA_APP_PRIVATE_KEY:
        required: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: reconcile
      cancel-in-progress: false
    steps:
      - name: Mint bot token
        id: app
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BUREAU_APP_ID }}
          private-key: ${{ secrets.BUREAU_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7

      - uses: actions/checkout@v7
        with:
          repository: dreadnought-foundry/bureau-pipeline
          ref: ${{ inputs.pipeline_ref || 'main' }}
          path: .bureau-pipeline

      - name: Sweep
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GH_TOKEN: ${{ steps.app.outputs.token }}
          # Workflow-dispatch needs actions:write, which the calling stub
          # grants to the workflow's own token — the App token gets HTTP 403
          # on the dispatch API (the silent DRE-1254 stall, 2026-06-12).
          # reconcile.py's gh_dispatch() swaps this in for `gh workflow run`.
          GH_DISPATCH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MAX_WIP: ${{ inputs.max_wip }}
        run: |
          # Cards carry `**Repo:** <slug>` — reconcile.py compares against the
          # lowercase repo basename.
          REPO_SLUG=$(basename "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          export REPO_SLUG
          python3 .bureau-pipeline/scripts/reconcile.py
