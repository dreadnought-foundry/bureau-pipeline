# Tests for the central pipeline's own logic. Every product repo inherits
# this code on its next run — changes here must pass these before merging.
name: Pipeline Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: scripts unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # pytest, not stdlib unittest discover: half the suite is written
      # pytest-style (function tests), which unittest discover silently
      # collects as ZERO tests — they had never run in CI before this.
      - name: Unit tests
        env:
          LINEAR_API_KEY: test-key
          REPO: test/test
          GH_TOKEN: test
        run: |
          # From the pinned manifest, not bare names — requirements-dev.txt
          # is Dependabot's pip manifest (DRE-2039); installing from it is
          # what makes a version-bump PR actually exercise the new pins.
          pip -q install -r requirements-dev.txt
          python3 -m pytest tests -v
      - name: Workflow YAML parses
        run: |
          pip -q install pyyaml
          python3 -c "import yaml, glob; [yaml.safe_load(open(f)) for f in glob.glob('.github/workflows/*.yml')]; print('yaml ok')"
      # Release-channel integrity (DRE-2026): every internal checkout of
      # bureau-pipeline must thread the pipeline_ref input, or a stub pinned
      # to @vN silently runs scripts/briefs/standards from @main.
      - name: pipeline_ref threading check
        run: |
          pip -q install pyyaml
          python3 scripts/check_pipeline_ref.py

  # TDD commit discipline (DRE-2022): this repo's PRs are hand-built, so the
  # rail's test-first order is enforced mechanically here — a commit touching
  # tests/ must precede the first commit changing non-test code (docs-only
  # and ops-only PRs exempt). Head-suite greenness is the `unit` job's job.
  tdd:
    name: TDD commit discipline
    # push runs (main) have no PR commit list to judge — PR events only.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # the check walks the PR's whole commit list
      - name: RED test precedes implementation
        env:
          # Through env, never interpolated into the shell line — a crafted
          # branch name must not become shell input.
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # The author decides the dependabot exemption (DRE-2049) —
          # GitHub-attested identity, never the spoofable branch name.
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          python3 scripts/check_tdd_commits.py "origin/$BASE_REF" "$HEAD_SHA"
