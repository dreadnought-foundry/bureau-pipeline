# Deterministic merge gate: merges an agent PR when ALL conditions hold —
# the branch current with its base (DRE-1924: a stale-but-green branch is
# updated and re-checked, never merged blind — the "green alone, red
# together" guard), every CI check green, AND the latest QA Critic verdict
# is APPROVE **for the PR's current head commit** (DRE-1990: the verdict
# embeds the SHA it reviewed; a missing or stale SHA is treated as no
# verdict). The merge uses the qa-bot identity (distinct GitHub App), so
# author != merger is enforced by identity, not policy. No human in the
# loop; no agent claims trusted — all inputs are read from GitHub's own
# records.
#
# The DECISION itself lives in scripts/merge_gate.py (DRE-1992) with the
# full rules and their history (DRE-1987 authorship, DRE-1990 SHA binding,
# DRE-1991 SKIP arm, anchored verdict parsing) — tested by the decision-
# table parity suite. This workflow only GATHERS the inputs and ACTS on the
# script's machine-readable verdict.
#
# Triggered (via the product-repo stub) from both directions of the race: CI
# finishing (workflow_run) and the critic verdict landing (issue_comment).
# Whichever happens last merges.
#
# Reusable workflow: permissions live in the calling stub (contents: read,
# actions: write). Job-level concurrency stays here — it keys off
# github.event, which is the caller's.
name: Merge Gate (reusable)

on:
  workflow_call:
    inputs:
      pipeline_ref:
        description: >-
          bureau-pipeline ref for the INTERNAL checkouts (scripts, briefs,
          standards). A stub pinned to this workflow @vN MUST pass the same
          vN here, or its scripts still float @main. Omitted = main (the
          rolling channel), byte-identical to the pre-DRE-2026 behavior.
        type: string
        required: false
        default: main
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      LINEAR_API_KEY:
        required: true
      BUREAU_APP_ID:
        required: false
      BUREAU_APP_PRIVATE_KEY:
        required: false
      BUREAU_QA_APP_ID:
        required: true
      BUREAU_QA_APP_PRIVATE_KEY:
        required: true

jobs:
  evaluate:
    # issue_comment leg (DRE-1987): only a verdict comment AUTHORED BY the
    # qa-bot App wakes the gate — anyone can type "QA Critic" in a comment.
    # The literal must match the BUREAU_QA_APP bot login; the decision steps
    # below re-derive the same login from the minted token (app-slug).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.event == 'pull_request' &&
       (startsWith(github.event.workflow_run.head_branch, 'agent/') ||
        startsWith(github.event.workflow_run.head_branch, 'repair/') ||
        startsWith(github.event.workflow_run.head_branch, 'dependabot/'))) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, 'QA Critic') &&
       github.event.comment.user.login == 'agent-bureau-qa-bot[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: merge-gate-${{ github.event.workflow_run.head_branch || github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Mint qa-bot token (author != merger)
        id: qa
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BUREAU_QA_APP_ID }}
          private-key: ${{ secrets.BUREAU_QA_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: dreadnought-foundry/bureau-pipeline
          ref: ${{ inputs.pipeline_ref || 'main' }}
          path: .bureau-pipeline

      - name: Evaluate and merge
        env:
          GH_TOKEN: ${{ steps.qa.outputs.token }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          EVENT: ${{ github.event_name }}
          WR_BRANCH: ${{ github.event.workflow_run.head_branch }}
          IC_PR: ${{ github.event.issue.number }}
          INPUT_PR: ${{ github.event.inputs.pr_number }}
        run: |
          set -euo pipefail
          # Resolve the PR number from whichever event fired.
          case "$EVENT" in
            workflow_run)      PR=$(gh pr list --head "$WR_BRANCH" --state open --json number --jq '.[0].number' || true) ;;
            workflow_dispatch) PR=$INPUT_PR ;;
            *)                 PR=$IC_PR ;;
          esac
          [ -z "${PR:-}" ] || [ "$PR" = "null" ] && { echo "no open PR — nothing to do"; exit 0; }

          BRANCH=$(gh pr view "$PR" --json headRefName,state --jq .headRefName)
          STATE=$(gh pr view "$PR" --json state --jq .state)
          [ "$STATE" != "OPEN" ] && { echo "PR #$PR is $STATE — nothing to do"; exit 0; }
          # agent/* = card work; repair/* = red-main auto-repair PRs
          # (DRE-1927); dependabot/* = dependency PRs (DRE-2039, minor/
          # patch only — the script's condition D routes majors to a
          # human). All merge ONLY here, as qa-bot, on CI green + critic
          # APPROVE (author != merger by App identity).
          case "$BRANCH" in agent/*|repair/*|dependabot/*) ;; *) echo "not an agent branch — skip"; exit 0;; esac
          CARD=$(printf '%s' "$BRANCH" | grep -oiE 'DRE-[0-9]+' | head -1 | tr '[:lower:]' '[:upper:]' || true)

          # Textual merge conflict: update-branch cannot resolve it; the
          # fix agent can. (Merge SKEW — a stale-but-green branch — is the
          # script's condition 0 below, DRE-1924: the old shell BEHIND
          # fast-path only worked with branch protection's up-to-date
          # toggle already on, and was untested.)
          MSTATE=$(gh pr view "$PR" --json mergeStateStatus --jq .mergeStateStatus)
          if [ "$MSTATE" = "DIRTY" ]; then
            # DRE-2039: never point the fix agent at a dependabot PR — it
            # has no card to work, and Dependabot rebases/recreates its own
            # conflicted PRs.
            case "$BRANCH" in dependabot/*)
              echo "dependabot PR has a conflict — dependabot rebases its own PRs; not dispatching the fix agent"
              exit 0;;
            esac
            echo "merge conflict with main — dispatching fix agent"
            # qa-bot token lacks Actions perms (deliberate); use the workflow's
            # own GITHUB_TOKEN — workflow_dispatch is exempt from the
            # no-cascade rule, so the dispatched run still fires.
            GH_TOKEN="${{ github.token }}" gh workflow run agent-fix.yml \
              --repo "${{ github.repository }}" \
              --ref "$(gh api repos/${{ github.repository }} --jq .default_branch)" \
              -f pr_number="$PR" || true
            exit 0
          fi

          # Gather the decision inputs from GitHub's own records; the rules
          # live in scripts/merge_gate.py (DRE-1992 — conditions 0-3:
          # branch current with its base (DRE-1924 — a stale branch's green
          # was earned against an older main; update, never merge blind),
          # CI green with the review-run exclusion by VERIFIED ORIGIN
          # (DRE-1994), critic APPROVE authored by the qa-bot App and
          # SHA-bound to this head, verifier PASS/SKIP/absent with the
          # fail-closed present-but-stale asymmetry).
          # REST check-runs API, NOT `gh pr checks` — the GraphQL rollup needs
          # actions:read the qa-bot App deliberately doesn't have.
          SHA=$(gh pr view "$PR" --json headRefOid --jq .headRefOid)
          gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" > /tmp/check-runs.json
          # DRE-1924: the branch-currency record — GitHub's own compare of
          # the PR's base against its current head (works with or without
          # the branch-protection up-to-date toggle). Trimmed to the status
          # field the script reads. A blip must fail CLOSED: `{}` → status
          # unknown → the gate waits; it never merges past an unverifiable
          # base and never updates the branch on unverifiable data.
          BASE=$(gh pr view "$PR" --json baseRefName --jq .baseRefName)
          gh api "repos/${{ github.repository }}/compare/$BASE...$SHA" --jq '{status: .status}' > /tmp/compare.json 2>/dev/null \
            || echo '{}' > /tmp/compare.json
          # A transient comments-API failure must read as "no verdicts yet"
          # (the gate waits, fail-closed) — the same tolerance the inline
          # shell had — not as a red merge-gate run.
          gh api "repos/${{ github.repository }}/issues/$PR/comments" > /tmp/comments.json 2>/dev/null \
            || echo '[]' > /tmp/comments.json
          # DRE-1994: the review-run exclusion is by VERIFIED ORIGIN, not
          # name — a PR-authored job can call itself "sneaky-review" and it
          # still counts against all-green. The runs listing is GitHub's own
          # record of which workflow FILE (path) produced each check suite;
          # merge_gate.py excludes only check runs sitting in a suite of an
          # allowlisted review workflow. The listing needs actions:read,
          # which the qa-bot App deliberately lacks — this ONE read uses the
          # workflow's own token (the calling stub grants actions perms). A
          # blip here must fail CLOSED: empty record → no exclusions → the
          # gate waits; it never merges past an unverifiable check.
          GH_TOKEN="${{ github.token }}" gh api "repos/${{ github.repository }}/actions/runs?head_sha=$SHA&per_page=100" > /tmp/workflow-runs.json 2>/dev/null \
            || echo '{"workflow_runs":[]}' > /tmp/workflow-runs.json
          # The trusted verdict author is derived from the same App key this
          # gate merges with (app-slug of the minted token), so an App rename
          # follows automatically; GitHub reserves the "[bot]" suffix, so no
          # user account can impersonate it. Empirically the critic posts as
          # agent-bureau-qa-bot[bot] since bureau-pipeline #51.
          QA_LOGIN="${{ steps.qa.outputs.app-slug }}[bot]"
          # DRE-2039: the dependabot-policy record — the PR author from
          # GitHub's own PR object (REST user.login gives the literal
          # "dependabot[bot]"; gh's GraphQL author rendering varies by
          # version) and the PR's commits, whose messages carry Dependabot's
          # machine-readable update-type trailer (the semver signal). A blip
          # must fail CLOSED: empty record → the script waits; it never
          # judges the semver level on unverifiable data.
          AUTHOR=$(gh api "repos/${{ github.repository }}/pulls/$PR" --jq .user.login)
          gh api "repos/${{ github.repository }}/pulls/$PR/commits?per_page=100" > /tmp/pr-commits.json 2>/dev/null \
            || echo '[]' > /tmp/pr-commits.json

          python3 .bureau-pipeline/scripts/merge_gate.py \
            --head-sha "$SHA" \
            --qa-login "$QA_LOGIN" \
            --check-runs-file /tmp/check-runs.json \
            --comments-file /tmp/comments.json \
            --workflow-runs-file /tmp/workflow-runs.json \
            --compare-file /tmp/compare.json \
            --review-workflows ".github/workflows/qa-review.yml,.github/workflows/pr-review.yml" \
            --head-branch "$BRANCH" \
            --pr-author "$AUTHOR" \
            --pr-commits-file /tmp/pr-commits.json \
            | tee /tmp/gate-decision
          # Fail-closed on shape drift: no `decision=merge` line, no merge.
          DECISION=$(grep -m1 '^decision=' /tmp/gate-decision | cut -d= -f2-)
          # DRE-1924: a stale branch is updated, never merged blind — CI
          # re-runs on the merged result and the gate re-evaluates when it
          # completes (a fresh SHA-bound review follows too, since the
          # update commit moves the head).
          if [ "$DECISION" = "update" ]; then
            echo "branch is stale relative to $BASE — updating; gate re-runs after CI"
            gh api -X PUT "repos/${{ github.repository }}/pulls/$PR/update-branch" >/dev/null || true
            exit 0
          fi
          # DRE-2039: `human` = the gate will NEVER merge this PR (a
          # dependabot major / unprovable semver level). Post the honest
          # state ONCE — the already-fetched comments record is the
          # idempotence check, so re-evaluations don't spam the PR — and
          # stop. No verdict-shaped text: this is a status note, not an
          # approval credential.
          if [ "$DECISION" = "human" ]; then
            REASON=$(grep -m1 '^reason=' /tmp/gate-decision | cut -d= -f2-)
            if ! grep -q "Merge gate: waiting for human merge" /tmp/comments.json; then
              gh pr comment "$PR" --body "⏸️ Merge gate: waiting for human merge — $REASON"
            fi
            exit 0
          fi
          [ "$DECISION" = "merge" ] || exit 0

          # Both gates green: advance card, merge as qa-bot.
          [ -n "$CARD" ] && python3 .bureau-pipeline/scripts/linear_ops.py advance "$CARD" "In Review" "In QA,In Progress" || true
          gh pr merge "$PR" --merge --delete-branch
          echo "merged PR #$PR"
          [ -n "$CARD" ] && python3 .bureau-pipeline/scripts/linear_ops.py comment "$CARD" \
            "🔀 Auto-merged by qa-bot: CI green + critic APPROVE. PR: $(gh pr view "$PR" --json url --jq .url)" || true
