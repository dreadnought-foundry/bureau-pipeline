# Executes a Linear card autonomously: triggered (via a thin stub in the
# product repo) by the bureau-linear-relay Lambda's repository_dispatch when
# a card with `**Repo:** <product>` enters Todo. The agent implements the
# card on a branch and opens a PR; CI and review gates are enforced by
# GitHub, not by the agent.
#
# Reusable workflow: concurrency + permissions live in the calling stub
# (which owns the trigger context). github.event / github.repository inside
# this file resolve to the CALLER's event and repo.
name: Agent Task (reusable)

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      LINEAR_API_KEY:
        required: true
      BUREAU_APP_ID:
        required: true
      BUREAU_APP_PRIVATE_KEY:
        required: true
      BUREAU_QA_APP_ID:
        required: false
      BUREAU_QA_APP_PRIVATE_KEY:
        required: false

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Mint bot token
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BUREAU_APP_ID }}
          private-key: ${{ secrets.BUREAU_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          token: ${{ steps.app.outputs.token }}
          fetch-depth: 0

      # Central pipeline scripts + briefs (public repo — no token needed).
      # Checked out AFTER the product repo so the product checkout's clean
      # step can't wipe it; excluded from the product repo's git view so an
      # agent `git add -A` can never commit it.
      - uses: actions/checkout@v5
        with:
          repository: dreadnought-foundry/bureau-pipeline
          path: .bureau-pipeline
      - name: Hide pipeline checkout from product git
        run: echo ".bureau-pipeline/" >> .git/info/exclude

      # Product-specific environment setup (submodules, toolchains, test DB).
      # Optional by design: a repo that needs nothing ships no setup.sh.
      - name: Product environment setup (optional)
        env:
          BOT_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          if [ -f .github/bureau/setup.sh ]; then
            bash .github/bureau/setup.sh
          else
            echo "no .github/bureau/setup.sh — skipping product setup"
          fi

      # Todo-entry card-validation gate (DRE-1405). The relay can't write to
      # Linear, so a malformed card (no resolvable repo, or no agent: role
      # label) would otherwise either silently vanish at the relay or dispatch
      # a broken build here. Validate the LIVE card and, if malformed AND still
      # in Todo/Triage, bounce it to Backlog with a diagnostic comment — and
      # skip every downstream step. Runs BEFORE Card → In Progress so a bounced
      # card never flips In Progress first.
      - name: Card-validation gate
        id: gate
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          python3 .bureau-pipeline/scripts/validate_card.py gate \
            "${{ github.event.client_payload.identifier }}"

      # Model selection: ordered preference ladder with runtime availability
      # detection (DRE-1490). select() walks the shared ladder best→worst —
      # claude-fable-5, then claude-opus-4-8, then claude-sonnet-4-6 (see
      # model_fallback.py / agents.yaml) — and returns the first AVAILABLE
      # model. Availability is probed via a minimal /v1/messages call using the
      # CLAUDE token already in the env (no new secret): a 404 / not-found ⇒
      # skip; any other response, including 429, ⇒ choose it; an inconclusive
      # probe falls through to the next known-good model. Fable 5 currently 404s
      # so this resolves to Opus 4.8 and self-heals to Fable when Anthropic
      # re-enables it — no code change. The chosen id is recorded in a heartbeat
      # comment so the board shows which model each attempt used.
      - name: Select model
        id: model
        if: steps.gate.outputs.bounced != 'true'
        env:
          # The probe authenticates with the same CLAUDE token the agent uses.
          ANTHROPIC_API_KEY: ${{ vars.CLAUDE_AUTH_MODE != 'subscription' && secrets.ANTHROPIC_API_KEY || '' }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ vars.CLAUDE_AUTH_MODE == 'subscription' && secrets.CLAUDE_CODE_OAUTH_TOKEN || '' }}
        run: |
          ROLE="${{ steps.gate.outputs.role }}"; [ -n "$ROLE" ] || ROLE=engineer
          MODEL=$(python3 .bureau-pipeline/scripts/model_fallback.py select "$ROLE")
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "selected model: $MODEL (role: $ROLE)"

      - name: Card → In Progress
        if: steps.gate.outputs.bounced != 'true'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          python3 .bureau-pipeline/scripts/linear_ops.py state \
            "${{ github.event.client_payload.identifier }}" "In Progress"
          # Heartbeat: record which model this attempt uses so the board/console
          # can surface per-attempt model (DRE-1354 AC).
          ROLE="${{ steps.gate.outputs.role }}"; [ -n "$ROLE" ] || ROLE=engineer
          python3 .bureau-pipeline/scripts/linear_ops.py comment \
            "${{ github.event.client_payload.identifier }}" \
            "🧠 model-attempt: ${{ steps.model.outputs.model }} — $ROLE agent starting."

      - name: Implement card
        id: claude
        if: steps.gate.outputs.bounced != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          # For the brief's progress heartbeats (⏳ n/5 phase comments that
          # drive the dashboard's per-card progress bar).
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        with:
          anthropic_api_key: ${{ vars.CLAUDE_AUTH_MODE != 'subscription' && secrets.ANTHROPIC_API_KEY || '' }}
          claude_code_oauth_token: ${{ vars.CLAUDE_AUTH_MODE == 'subscription' && secrets.CLAUDE_CODE_OAUTH_TOKEN || '' }}
          github_token: ${{ steps.app.outputs.token }}
          allowed_bots: agent-bureau-bot
          claude_args: |
            --max-turns 150
            --model ${{ steps.model.outputs.model }}
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep"
          prompt: |
            Read .bureau-pipeline/briefs/${{ steps.gate.outputs.role || 'engineer' }}.md
            for your role and conventions, then .github/bureau/overrides.md in
            this repo for stack-specific commands (it is mandatory reading if
            present), then implement this Linear card.

            Card: ${{ github.event.client_payload.identifier }} — ${{ github.event.client_payload.title }}
            Card URL: ${{ github.event.client_payload.url }}

            Description:
            ${{ github.event.client_payload.description }}

            Process (mandatory):
            1. Create branch agent/${{ github.event.client_payload.identifier }}-<short-slug> off the default branch.
            2. TDD: write failing tests first, commit, then implement until green.
            3. Run the local checks listed in .github/bureau/overrides.md —
               all must pass locally before you push.
            4. Push the branch and open a PR with `gh pr create` titled
               "feat(${{ github.event.client_payload.identifier }}): <summary>",
               body must include the card URL. GH_TOKEN is already in your env.
            5. If the card is ambiguous or impossible as specified, do NOT
               guess: open no PR, and write your blocker reason to
               /tmp/agent-blocker.txt instead.

      # DRE-1346 Fix 1: the execution result can end {"subtype":"success",
      # "is_error":true} (usage-limit/API death mid-run) — previously the
      # job went green and the medic never fired. Fail loudly on a no-evidence
      # silent death; the report step below still runs (always()) and requeues.
      #
      # DRE-1354: an is_error death is NO LONGER a hard gate failure
      # (--ignore-is-error). The Report step handles it through the
      # model-fallback requeue — switch model + count toward the shared hold cap.
      # A hard fail here would trip the medic into re-running the job on the SAME
      # flaky model, bypassing the cap (the DRE-1300 18×-loop). The card is still
      # surfaced (model-error comment) and requeued; it just doesn't go red and
      # re-run blind.
      - name: Gate on agent result
        if: always() && steps.gate.outcome == 'success' && steps.gate.outputs.bounced != 'true'
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          CARD: ${{ github.event.client_payload.identifier }}
        run: |
          BRANCH=$(git branch -r | grep -o "agent/${CARD}[^ ]*" | head -1 | sed 's|origin/||' || true)
          PR_URL=""
          if [ -n "$BRANCH" ]; then
            PR_URL=$(gh pr list --head "$BRANCH" --json url --jq '.[0].url' 2>/dev/null || true)
          fi
          EXEC_FILE="${{ steps.claude.outputs.execution_file }}"
          [ -n "$EXEC_FILE" ] || EXEC_FILE=/home/runner/work/_temp/claude-execution-output.json
          python3 .bureau-pipeline/scripts/check_agent_result.py \
            "$EXEC_FILE" "$BRANCH" "$PR_URL" /tmp/agent-blocker.txt --ignore-is-error

      - name: Report result to Linear
        if: always() && steps.gate.outcome == 'success' && steps.gate.outputs.bounced != 'true'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GH_TOKEN: ${{ steps.app.outputs.token }}
          CARD: ${{ github.event.client_payload.identifier }}
          MODEL_USED: ${{ steps.model.outputs.model }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Resolve the card's branch FIRST and guard on it: an empty --head
          # filter makes `gh pr list` return the repo's most recent open PR,
          # which once attributed another card's PR to a dead run and sent it
          # to In QA with a false "PR opened" receipt (DRE-1343, 2026-06-12).
          BRANCH=$(git branch -r | grep -o "agent/${CARD}[^ ]*" | head -1 | sed 's|origin/||' || true)
          PR_URL=""
          if [ -n "$BRANCH" ]; then
            PR_URL=$(gh pr list --head "$BRANCH" --json url --jq '.[0].url' 2>/dev/null || true)
          fi

          # Did the run die with an API/model error (is_error)? (DRE-1354)
          # check_agent_result.py owns is_error detection; reuse it as the single
          # source of truth so the gate and this step never disagree.
          EXEC_FILE="${{ steps.claude.outputs.execution_file }}"
          [ -n "$EXEC_FILE" ] || EXEC_FILE=/home/runner/work/_temp/claude-execution-output.json
          IS_ERROR=false
          if python3 -c "import sys; sys.path.insert(0, '.bureau-pipeline/scripts'); import check_agent_result as c; e=c._load_execution('$EXEC_FILE'); sys.exit(0 if (e or {}).get('is_error') is True else 1)"; then
            IS_ERROR=true
          fi

          if [ -n "$PR_URL" ] && [ "$PR_URL" != "null" ]; then
            python3 .bureau-pipeline/scripts/linear_ops.py comment "$CARD" \
              "🤖 PR opened: $PR_URL — CI + critic review running. Run: $RUN_URL"
            python3 .bureau-pipeline/scripts/linear_ops.py advance "$CARD" "In QA" "In Progress,Todo"
          elif [ -f /tmp/agent-blocker.txt ]; then
            # Backlog, NEVER Todo: the relay dispatches a fresh agent on every
            # Todo transition, and a blocker is deterministic — the next agent
            # reads the same card and blocks on the same wall, forever. (Origin:
            # DRE-1286 redispatched 6s after its blocker note, 2026-06-12.)
            # Backlog is inert until a human (or a description fix + the
            # dependency gate) releases it.
            python3 .bureau-pipeline/scripts/linear_ops.py comment "$CARD" \
              "🛑 Agent blocked: $(cat /tmp/agent-blocker.txt) — parked in Backlog until the blocker is resolved (a Todo return here would redispatch agents into the same wall). Run: $RUN_URL"
            python3 .bureau-pipeline/scripts/linear_ops.py state "$CARD" "Backlog" || true
          else
            # No PR and no blocker. Three death classes share ONE hold cap,
            # counted by the 'dead-run-requeue' tag (DRE-1403): silent (here),
            # hung (reconcile sweep), and — new in DRE-1354 — is_error (an
            # API/model death mid-run). dead_run.decide() unifies requeue-vs-hold
            # and, for an is_error death, records a 'model-error:' marker so the
            # requeue's next attempt selects the ALTERNATE model (Opus↔Fable)
            # instead of re-dying on the same one. is_error deaths now COUNT
            # toward the cap (previously they failed the job and the medic re-ran
            # on the same model, bypassing it — DRE-1300 looped 18×).
            DEAD=$(python3 .bureau-pipeline/scripts/linear_ops.py count-comments \
              "$CARD" "dead-run-requeue" || echo 0)
            ERR_FLAGS=""
            if [ "$IS_ERROR" = "true" ]; then
              ERR_FLAGS="--is-error --error-model $MODEL_USED"
            fi
            DECISION=$(python3 .bureau-pipeline/scripts/dead_run.py decide \
              "${DEAD:-0}" $ERR_FLAGS --run-url "$RUN_URL")
            ACTION=$(printf '%s\n' "$DECISION" | head -1)
            BODY=$(printf '%s\n' "$DECISION" | tail -n +3)
            python3 .bureau-pipeline/scripts/linear_ops.py comment "$CARD" "$BODY"
            if [ "$ACTION" = "hold" ]; then
              python3 .bureau-pipeline/scripts/linear_ops.py add-label "$CARD" needs-human || true
              python3 .bureau-pipeline/scripts/linear_ops.py state "$CARD" "Backlog" || true
            else
              python3 .bureau-pipeline/scripts/linear_ops.py state "$CARD" "Todo" || true
            fi
          fi
