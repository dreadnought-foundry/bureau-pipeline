# Self-host trigger stub (DRE-1929, adr-bureau-pipeline-self-host) — this repo
# consumes its OWN reusable workflows exactly like a product repo.
# @main on purpose: this repo is the canary channel; the fleet rides tags.
name: Agent Fix

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to fix
        required: true

concurrency:
  group: agent-fix-${{ github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  call:
    uses: dreadnought-foundry/bureau-pipeline/.github/workflows/agent-fix.yml@main
    secrets: inherit
